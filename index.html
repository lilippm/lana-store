<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lana Store</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Kanit',sans-serif;
background:#fff4f7;
padding-bottom:90px;
}

/* HEADER */
.header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
font-size:18px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
}

/* NOTI */
.bell{
position:relative;
}
.badge{
position:absolute;
top:-5px;
right:-5px;
background:#ff3b3b;
color:#fff;
font-size:10px;
padding:2px 6px;
border-radius:10px;
}

/* SEARCH */
.search{
margin:10px;
background:#fff;
padding:12px;
border-radius:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

/* TABS */
.tabs{
display:flex;
gap:8px;
margin:10px;
overflow-x:auto;
}

.tab{
padding:6px 14px;
border-radius:20px;
background:#fff;
font-size:12px;
color:#555;
}

.activeTab{
background:#ff5f93;
color:#fff;
font-weight:600;
}

/* CARD */
.card{
background:#fff;
margin:10px;
padding:12px;
border-radius:18px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 5px 15px rgba(255,105,150,0.08);
}

/* LEFT */
.left{
display:flex;
align-items:center;
gap:10px;
}

/* NUMBER */
.num{
width:24px;
height:24px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
color:#fff;
font-size:12px;
}

/* COLOR NUMBER */
.n1{background:#ff6b9a}
.n2{background:#ffa726}
.n3{background:#4caf50}
.n4{background:#9c27b0}

/* AVATAR */
.avatar{
width:45px;
height:45px;
border-radius:15px;
background:#ffe0ec;
display:flex;
align-items:center;
justify-content:center;
}

.avatar img{
width:35px;
}

/* STATUS */
.status{
font-size:11px;
padding:4px 10px;
border-radius:12px;
font-weight:500;
}

.wait{background:#ffd9e7;color:#ff5f93}
.doing{background:#ffe8c2;color:#ff9800}
.done{background:#d6ffe5;color:#2ecc71}

/* RIGHT */
.right{
text-align:right;
}

.price{
color:#ff5f93;
font-weight:600;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:12px 0;
box-shadow:0 -5px 20px rgba(0,0,0,0.08);
border-top-left-radius:20px;
border-top-right-radius:20px;
}

.navItem{
font-size:11px;
color:#999;
text-align:center;
}

.activeNav{
color:#ff5f93;
font-weight:600;
}

/* FAB */
.fab{
position:fixed;
bottom:75px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
border-radius:50%;
background:#ff5f93;
color:#fff;
font-size:30px;
border:none;
box-shadow:0 5px 20px rgba(255,105,150,0.4);
}
</style>
</head>

<body>

<div class="header">
<div class="title">
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/616/616408.png">
Lana Store
</div>

<div class="bell">
🔔
<div class="badge" id="noti">3</div>
</div>
</div>

<div class="search">🔍 ค้นหาชื่อลูกค้า</div>

<div class="tabs">
<div class="tab activeTab">ทั้งหมด</div>
<div class="tab">รอคิว</div>
<div class="tab">กำลังทำ</div>
<div class="tab">เสร็จ</div>
</div>

<div id="list"></div>

<!-- NAV -->
<div class="nav">
<div class="navItem activeNav">🏠<br>หน้าหลัก</div>
<div class="navItem">💰<br>รายได้</div>
<div class="navItem">📒<br>บันทึก</div>
<div class="navItem">⚙️<br>ตั้งค่า</div>
</div>

<button class="fab" onclick="add()">+</button>

<script>
let data=[
{name:"คุณมีนี่",qty:"16",price:250,status:"wait"},
{name:"คุณแพรวา",qty:"24",price:450,status:"doing"},
{name:"คุณเฟิร์น",qty:"32",price:600,status:"done"},
{name:"คุณมิ้ว",qty:"8",price:150,status:"wait"}
];

function render(){
let html="";

data.forEach((r,i)=>{

let numClass = "n"+((i%4)+1);

html+=`
<div class="card">

<div class="left">
<div class="num ${numClass}">${i+1}</div>

<div class="avatar">
<img src="https://cdn-icons-png.flaticon.com/512/616/616408.png">
</div>

<div>
<b>${r.name}</b><br>
<span class="status ${r.status}">
${r.status=="wait"?"รอคิว":r.status=="doing"?"กำลังทำ":"เสร็จ"}
</span>
</div>
</div>

<div class="right">
<div class="price">${r.price} บาท</div>
<div style="font-size:11px;color:#aaa;">${r.qty} รูป</div>
</div>

</div>
`;
});

list.innerHTML=html;
}

function add(){
data.push({name:"ลูกค้าใหม่",qty:"8",price:150,status:"wait"});
render();
}

render();
</script>

</body>
</html>
