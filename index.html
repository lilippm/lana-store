<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lana Store</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:'Kanit',sans-serif;background:#ffeaf2}

/* PAGE */
.page{display:none}
.active{display:block}

/* LOGIN */
.login{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}
.login input{
width:80%;
padding:15px;
margin:5px;
border-radius:15px;
border:none;
}
.login button{
width:80%;
padding:15px;
background:#ff5f93;
color:#fff;
border:none;
border-radius:15px;
}

/* HEADER */
.header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}
.title{font-weight:600}

/* CARD */
.card{
background:#fff;
margin:10px;
padding:15px;
border-radius:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* STATUS */
.wait{background:#ffd9e7}
.doing{background:#ffe8c2}
.edit{background:#d6ffe5}
.done{background:#d6ecff}

/* TYPE */
.type1{color:#ff4d88}
.type2{color:#00b894}
.type3{color:#6c5ce7}
.type4{color:#e67e22}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px;
}

/* FAB */
.fab{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:60px;height:60px;
border-radius:50%;
background:#ff5f93;
color:#fff;
font-size:28px;
border:none;
}

/* POPUP */
.popup{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.box{
width:90%;
background:#fff;
padding:20px;
border-radius:20px;
}
.input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
border:none;
background:#f3f3f3;
}

/* SEARCH */
.search{
width:90%;
margin:10px;
padding:10px;
border-radius:15px;
border:none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login">
<h2>🔐 Admin Login</h2>
<input id="user" placeholder="username">
<input id="pass" placeholder="password">
<button onclick="login()">เข้าสู่ระบบ</button>
<br>
<button onclick="customer()">เข้าดูลูกค้า</button>
</div>

<!-- MAIN -->
<div id="app" class="page">

<div class="header">
<div class="title">🐰 Lana Store</div>
<div onclick="alert('มีออเดอร์ใหม่!')">🔔 <span id="noti"></span></div>
</div>

<input class="search" placeholder="🔍 ค้นหาชื่อลูกค้า" oninput="search(this.value)">

<div id="list"></div>

<button class="fab" onclick="openPopup()">+</button>

<div class="nav">
<div onclick="show('app')">🏠</div>
<div onclick="show('wallet')">💰</div>
<div onclick="show('diary')">📒</div>
<div onclick="line()">💬</div>
</div>

</div>

<!-- WALLET -->
<div id="wallet" class="page">
<div class="card">💰 รายได้รวม: <h2 id="money">0</h2></div>
</div>

<!-- DIARY -->
<div id="diary" class="page">
<div class="card">
<textarea id="note" class="input"></textarea>
<button onclick="saveNote()">บันทึก</button>
</div>
<div id="notes"></div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
<div class="box">

<input id="name" class="input" placeholder="ชื่อลูกค้า">

<select id="type" class="input">
<option value="type1">สติกเกอร์ message</option>
<option value="type2">ตัดรูปโปร่งใส (ลูกค้า)</option>
<option value="type3">ตัดรูปโปร่งใส (แม่ค้า)</option>
<option value="type4">สติกเกอร์ไลน์</option>
</select>

<select id="qty" class="input">
<option>8รูป</option>
<option>16รูป</option>
<option>24รูป</option>
<option>32รูป</option>
</select>

<button onclick="save()">บันทึก</button>

</div>
</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyCu-xeTBNSLvQY_oSCSfeMm2uAOqHPneFE",
  authDomain: "lana-store-f9410.firebaseapp.com",
  databaseURL: "https://lana-store-f9410-default-rtdb.firebaseio.com",
  projectId: "lana-store-f9410",
  storageBucket: "lana-store-f9410.appspot.com",
  messagingSenderId: "452867156283",
  appId: "1:452867156283:web:43181d89a5ea12b19bef1e"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// LOGIN
function login(){
if(user.value=="lana2" && pass.value=="123454321Pp"){
document.getElementById("login").style.display="none";
document.getElementById("app").classList.add("active");
}else{
alert("รหัสผิด");
}
}

function customer(){
document.getElementById("login").style.display="none";
document.getElementById("app").classList.add("active");
}

// PAGE
function show(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

// POPUP
function openPopup(){popup.style.display="flex"}

// SAVE
function save(){
let price = qty.value=="8รูป"?150:
qty.value=="16รูป"?250:
qty.value=="24รูป"?450:600;

db.ref("queue").push({
name:name.value,
type:type.value,
typeText:type.options[type.selectedIndex].text,
qty:qty.value,
price:price,
status:"wait",
statusText:"รอคิว"
});

popup.style.display="none";
}

// REALTIME
db.ref("queue").on("value", snap=>{
let data = snap.val()||{};
let arr = Object.values(data);

let html="";
let money=0;

arr.forEach((r,i)=>{
money+=r.price;

html+=`
<div class="card ${r.status}">
💖 ${r.name}<br>
📌 <span class="${r.type}">${r.typeText}</span><br>
📦 ${r.qty}<br>
💰 ${r.price} บาท<br>
🔢 คิว ${i+1}
<button onclick="bill(${i})">🧾 บิล</button>
</div>`;
});

list.innerHTML=html;
moneyEl.innerText=money;
noti.innerText=arr.length;
});

// SEARCH
function search(q){
db.ref("queue").once("value", snap=>{
let arr = Object.values(snap.val()||{});
render(arr.filter(x=>x.name.includes(q)));
});
}

function render(arr){
let html="";
arr.forEach((r,i)=>{
html+=`<div class="card">${r.name}</div>`;
});
list.innerHTML=html;
}

// BILL
function bill(i){
db.ref("queue").once("value", snap=>{
let arr = Object.values(snap.val()||{});
let r = arr[i];

let text = `ลูกค้า: ${r.name}
รายการ: ${r.typeText}
จำนวน: ${r.qty}
ราคา: ${r.price} บาท

TRUEWALLET: 0972962083
SCB: 9692138645`;

navigator.clipboard.writeText(text);

const { jsPDF } = window.jspdf;
let doc = new jsPDF();
doc.text(text,10,20);
doc.save("bill.pdf");
});
}

// LINE
function line(){
window.open("https://line.me/R/ti/p/@fvd2237h");
}

// NOTE
function saveNote(){
notes.innerHTML+=`<div class="card">${note.value}</div>`;
}
</script>

</body>
</html>
