<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lana Store</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit&display=swap" rel="stylesheet">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Kanit;background:#ffeaf2}
.card{background:#fff;margin:10px;padding:15px;border-radius:15px}
.btn{background:#ff5f93;color:#fff;border:none;padding:10px;border-radius:10px;width:100%}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none;background:#eee}

/* LOGIN */
#login{
position:fixed;width:100%;height:100%;background:#fff;
display:flex;justify-content:center;align-items:center;
z-index:999;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div style="width:80%;text-align:center">
    <h2>🔐 Admin Login</h2>
    <input id="user" placeholder="username">
    <input id="pass" placeholder="password">
    <button class="btn" onclick="login()">เข้าสู่ระบบ</button>
    <br><br>
    <button onclick="guest()">เข้าดูคิวลูกค้า</button>
  </div>
</div>

<h2 style="padding:10px">🐰 Lana Store</h2>

<input id="search" placeholder="🔍 ค้นหาชื่อ" oninput="filter()">

<div id="adminBox" style="display:none" class="card">
<input id="name" placeholder="ชื่อลูกค้า">

<select id="qty">
<option>8รูป</option>
<option>16รูป</option>
<option>24รูป</option>
<option>32รูป</option>
</select>

<button class="btn" onclick="add()">เพิ่มคิว</button>
</div>

<div id="list"></div>

<button onclick="line()">💬 LINE</button>

<img src="https://promptpay.io/0841169561.png" width="200">

<script>

// 🔐 LOGIN
let isAdmin=false;

function login(){
if(user.value==="lana2" && pass.value==="123454321Pp"){
isAdmin=true;
login.style.display="none";
adminBox.style.display="block";
alert("เข้าสู่ระบบสำเร็จ 💖");
}else alert("ผิด ❌");
}

function guest(){
login.style.display="none";
}

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey:"...",
  authDomain:"...",
  databaseURL:"...",
  projectId:"..."
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🔔 เสียงแจ้งเตือน
let audio=new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// 📦 DATA
let all=[];

db.ref("queue").on("value",snap=>{
all=[];
snap.forEach(c=>all.push({...c.val(),key:c.key}));
render(all);
});

db.ref("queue").on("child_added",()=>{
audio.play();
});

// 🧠 RENDER
function render(data){
let html="";
data.forEach((d,i)=>{
html+=`
<div class="card">
💖 ${d.name}<br>
📦 ${d.qty}<br>
💰 ${d.price} บาท<br>
🔢 คิว ${i+1}

${isAdmin?`
<button class="btn" onclick="bill('${d.name}',${d.price})">🧾 บิล</button>
<button class="btn" onclick="del('${d.key}')">ลบ</button>
`:""}
</div>`;
});
list.innerHTML=html;
}

// ➕ ADD
function add(){
let price = qty.value=="8รูป"?150:
qty.value=="16รูป"?250:
qty.value=="24รูป"?450:600;

db.ref("queue").push({
name:name.value,
qty:qty.value,
price:price
});
}

// ❌ DELETE
function del(key){
db.ref("queue/"+key).remove();
}

// 🔍 SEARCH
function filter(){
let q=search.value;
render(all.filter(x=>x.name.includes(q)));
}

// 🧾 BILL
function bill(name,price){
let text=`Lana Store
ลูกค้า: ${name}
ยอด: ${price} บาท

TrueWallet: 0972962083
SCB: 9692138645
PromptPay: 0841169561`;

navigator.clipboard.writeText(text);

const { jsPDF } = window.jspdf;
let doc=new jsPDF();
doc.text(text,10,20);
doc.save("bill.pdf");
}

// 💬 LINE
function line(){
window.open("https://line.me/R/ti/p/@fvd2237h");
}

</script>

</body>
</html>
