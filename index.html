<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

/* SHARE BILL */

async function shareBill(){

const billElement=document.querySelector(".billWrap");

try{

const canvas=await html2canvas(billElement,{
scale:3,
useCORS:true,
backgroundColor:"#fff5f8"
});

/* แปลงรูป */

canvas.toBlob(function(blob){

const file=new File(
[blob],
"LanaStore-Bill.png",
{type:"image/png"}
);

/* แชร์มือถือ */

if(navigator.share){

navigator.share({
files:[file],
title:"Lana Store Bill"
}).then(()=>{

alert("แชร์/บันทึกรูปแล้ว 💖");

}).catch(err=>{

console.log(err);

downloadImage(blob);

});

}else{

downloadImage(blob);

}

});

}catch(err){

console.log(err);

alert("เกิดข้อผิดพลาด");

}

}

/* โหลดเข้าเครื่อง */

function downloadImage(blob){

const url=URL.createObjectURL(blob);

const a=document.createElement("a");

a.href=url;

a.download="LanaStore-Bill.png";

document.body.appendChild(a);

a.click();

document.body.removeChild(a);

setTimeout(()=>{

URL.revokeObjectURL(url);

},1000);

alert("บันทึกรูปแล้ว 💖");

}

</script>
