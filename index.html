<!DOCTYPE html><html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lana Store • Pro Max</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet"><style>
:root{
  --bg1:#eaf6ff;
  --bg2:#fff5fb;
  --primary:#6ec1ff;
  --accent:#ff9acb;
  --text:#2a2a2a;
}
*{box-sizing:border-box}
body{font-family:'Kanit',sans-serif;background:linear-gradient(180deg,var(--bg1),var(--bg2));margin:0;padding:18px;color:var(--text)}
.card{background:#fff;border-radius:28px;padding:20px;max-width:420px;margin:auto;box-shadow:0 18px 40px rgba(0,0,0,.12)}
.header{display:flex;flex-direction:column;align-items:center;gap:8px}
.logo{width:96px;height:96px;border-radius:50%;object-fit:cover;border:5px solid #f1f8ff}
.brand{font-weight:600;color:#5aaef5}
.tag{font-size:12px;color:#9aa3ad}
.section{margin-top:18px}
.label{font-weight:600;margin-bottom:6px;display:block}
.select,input{width:100%;padding:12px;border-radius:16px;border:1px solid #e6e6e6;background:#fafcff}
.row{display:flex;gap:10px}
.price{font-size:30px;font-weight:700;color:var(--accent);text-align:center;margin-top:6px}
.btn{background:var(--primary);color:#fff;border:none;padding:14px;border-radius:18px;width:100%;margin-top:10px;cursor:pointer;font-weight:600}
.btn.line{background:#25D366}
.btn.alt{background:#ffd3e7;color:#a84c78}
.small{font-size:12px;color:#8a8a8a}
.qr{width:190px;display:block;margin:10px auto 0}
.chip{display:inline-flex;align-items:center;gap:6px;padding:8px 12px;border-radius:999px;background:#f3faff;border:1px solid #e5f2ff}
.dashboard{background:#f7fbff;border-radius:20px;padding:14px;margin-top:14px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:#fff;border-radius:16px;padding:10px;box-shadow:0 6px 16px rgba(0,0,0,.06)}
</style></head><body>
<div class="card"><div class="header">
  <img id="logo" class="logo" src="https://via.placeholder.com/96">
  <div class="brand">💖 Lana Store</div>
  <div class="tag">cute • clean • premium</div>
  <input type="file" onchange="uploadLogo(event)">
</div><div class="section">
  <label class="label">📦 เลือกแพ็กเกจ</label>
  <select id="package" class="select">
    <option value="59">Basic • ป้ายธรรมดา — 59</option>
    <option value="79">Premium • ป้ายพรีเมียม — 79</option>
    <option value="99">Pro • ป้ายโปร — 99</option>
  </select>
</div><div class="section">
  <label class="chip"><input type="checkbox" id="fast"> ⚡ Fast Track +20</label>
</div><div class="section">
  <div class="price" id="total">฿59</div>
</div><div class="section">
  <label class="label">💳 PromptPay</label>
  <div class="row">
    <input id="phone" placeholder="เบอร์พร้อมเพย์">
    <button class="btn alt" onclick="generateQR()">สร้าง QR</button>
  </div>
  <img id="qr" class="qr" style="display:none">
</div><div class="section">
  <button class="btn" onclick="order()">🧾 สั่งซื้อ</button>
  <button class="btn line" onclick="sendLine()">💬 ส่งเข้า LINE</button>
  <button class="btn alt" onclick="downloadPDF()">📄 PDF ใบเสร็จ</button>
</div><div class="section">
  <div class="label">📄 ใบเสร็จ</div>
  <div id="receipt" class="small">ยังไม่มีรายการ</div>
</div><div class="dashboard">
  <div class="label">📊 Dashboard</div>
  <div class="grid">
    <div class="stat">ยอดวันนี้<br><b id="today">0</b> บาท</div>
    <div class="stat">ออเดอร์<br><b id="orders">0</b></div>
  </div>
</div></div><script>
const { jsPDF } = window.jspdf;

// state
let wallet = parseInt(localStorage.getItem('wallet')||0);
let today = parseInt(localStorage.getItem('today')||0);
let orders = parseInt(localStorage.getItem('orders')||0);

// init
const logoEl = document.getElementById('logo');
const pkg = document.getElementById('package');
const fast = document.getElementById('fast');
const totalEl = document.getElementById('total');
const receiptEl = document.getElementById('receipt');
const todayEl = document.getElementById('today');
const ordersEl = document.getElementById('orders');

function renderStats(){
  todayEl.innerText = today;
  ordersEl.innerText = orders;
}
renderStats();

// logo persist
const savedLogo = localStorage.getItem('logo');
if(savedLogo) logoEl.src = savedLogo;
function uploadLogo(e){
  const r = new FileReader();
  r.onload = ()=>{ logoEl.src = r.result; localStorage.setItem('logo', r.result); };
  r.readAsDataURL(e.target.files[0]);
}

function calc(){
  const base = parseInt(pkg.value);
  const extra = fast.checked ? 20 : 0;
  const t = base + extra;
  totalEl.innerText = '฿' + t;
  return t;
}

function order(){
  const t = calc();
  const text = `Lana Store\n${pkg.selectedOptions[0].text}\nรวม ${t} บาท`;
  receiptEl.innerText = text;
  localStorage.setItem('lastReceipt', text);
  today += t; orders += 1;
  localStorage.setItem('today', today);
  localStorage.setItem('orders', orders);
  renderStats();
}

function sendLine(){
  const msg = encodeURIComponent(localStorage.getItem('lastReceipt')||'');
  window.open(`https://line.me/R/msg/text/?${msg}`);
}

function downloadPDF(){
  const doc = new jsPDF();
  const text = localStorage.getItem('lastReceipt')||'';
  if(logoEl.src.includes('data')){
    doc.addImage(logoEl.src,'PNG',85,10,40,40);
  }
  doc.setFontSize(16);
  doc.text('Lana Store', 85, 60);
  doc.setFontSize(12);
  doc.text(text, 20, 80);
  doc.save('lana-receipt.pdf');
}

function generateQR(){
  const phone = document.getElementById('phone').value;
  const amount = calc();
  if(!phone) return alert('ใส่เบอร์ก่อน');
  const url = `https://promptpay.io/${phone}/${amount}`;
  const qr = document.getElementById('qr');
  qr.src = url; qr.style.display = 'block';
}

pkg.addEventListener('change', calc);
fast.addEventListener('change', calc);
calc();
</script></body>
</html>
