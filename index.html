<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script>

/* SAVE BILL มือถือ */

async function shareBill(){

const billElement=document.querySelector(".billWrap");

try{

const canvas=await html2canvas(billElement,{
scale:3,
useCORS:true,
allowTaint:true,
backgroundColor:"#fff5f8"
});

const image=canvas.toDataURL("image/png");

/* โหลดไฟล์ */

const link=document.createElement("a");

link.href=image;

link.download="LanaStore-Bill.png";

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

/* เปิดรูปให้อีกที กันมือถือบางรุ่น */

setTimeout(()=>{

window.open(image,"_blank");

},500);

alert("ถ้าไม่เซฟอัตโนมัติ ให้กดค้างที่รูป แล้วกด ดาวน์โหลด 💖");

}catch(err){

console.log(err);

alert("เกิดข้อผิดพลาดในการเซฟรูป");

}

}

</script>
