<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lana Store</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Kanit',sans-serif;
background:#fff4f7;
padding-bottom:90px;
}

/* PAGE */
.page{display:none;}
.active{display:block;}

/* HEADER */
.header{
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.title{
display:flex;
align-items:center;
gap:10px;
font-weight:600;
font-size:18px;
}

.logo{width:40px;border-radius:50%;}

/* NOTI */
.bell{position:relative;}
.badge{
position:absolute;top:-5px;right:-5px;
background:#ff3b3b;color:#fff;
font-size:10px;padding:2px 6px;border-radius:10px;
}

/* SEARCH */
.search{
margin:10px;background:#fff;padding:12px;
border-radius:20px;
box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

/* TABS */
.tabs{display:flex;gap:8px;margin:10px;overflow-x:auto;}
.tab{padding:6px 14px;border-radius:20px;background:#fff;font-size:12px;color:#555;cursor:pointer;}
.activeTab{background:#ff5f93;color:#fff;font-weight:600;}

/* CARD */
.card{
background:#fff;margin:10px;padding:12px;border-radius:18px;
display:flex;justify-content:space-between;align-items:center;
box-shadow:0 5px 15px rgba(255,105,150,0.08);
}

.left{display:flex;gap:10px;align-items:center;}
.num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;}
.n1{background:#ff6b9a}.n2{background:#ffa726}.n3{background:#4caf50}.n4{background:#9c27b0}

.avatar{width:45px;height:45px;border-radius:15px;background:#ffe0ec;display:flex;align-items:center;justify-content:center;}
.avatar img{width:32px}

/* TYPE */
.type{font-size:11px;padding:3px 8px;border-radius:10px;margin-top:3px;display:inline-block;}
.t1{background:#ffd9e7;color:#ff5f93}
.t2{background:#d6ecff;color:#3498db}
.t3{background:#ffe8c2;color:#ff9800}
.t4{background:#e1d7ff;color:#6c5ce7}

/* STATUS */
.status{font-size:11px;padding:4px 10px;border-radius:12px;margin-top:3px;display:inline-block;}
.s1{background:#ffd9e7;color:#ff5f93}
.s2{background:#ffe8c2;color:#ff9800}
.s3{background:#fff3cd;color:#b8860b}
.s4{background:#d6ecff;color:#3498db}
.s5{background:#e1d7ff;color:#6c5ce7}
.s6{background:#d6ffe5;color:#2ecc71}

/* QTY */
.qtyTag{font-size:11px;padding:3px 8px;border-radius:10px;background:#f0f0f0;margin-top:3px;display:inline-block;}

.right{text-align:right;}
.price{color:#ff5f93;font-weight:600}

/* NAV */
.nav{
position:fixed;bottom:0;width:100%;
background:#fff;display:flex;justify-content:space-around;
padding:12px 0;
box-shadow:0 -5px 20px rgba(0,0,0,0.08);
border-top-left-radius:20px;border-top-right-radius:20px;
}
.navItem{font-size:11px;color:#999;text-align:center;cursor:pointer;}
.activeNav{color:#ff5f93;font-weight:600}

/* FAB */
.fab{
position:fixed;bottom:75px;left:50%;
transform:translateX(-50%);
width:60px;height:60px;border-radius:50%;
background:#ff5f93;color:#fff;font-size:30px;border:none;
box-shadow:0 5px 20px rgba(255,105,150,0.4);
}

/* BILL */
.bill{
margin:10px;padding:15px;
border-radius:20px;
background:#fffdf8;
border:3px dashed #ffb6c1;
text-align:center;
}
.copyBtn{
margin-top:10px;
background:#ff5f93;color:#fff;
border:none;padding:8px 12px;border-radius:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
<div class="header">
<div class="title">
<img class="logo" src="https://cdn-icons-png.flaticon.com/512/616/616430.png">
Lana Store
</div>

<div class="bell">🔔 <div class="badge" id="noti">0</div></div>
</div>

<div class="search">🔍 ค้นหาชื่อลูกค้า</div>

<div class="tabs">
<div class="tab activeTab" onclick="setFilter('all',this)">ทั้งหมด</div>
<div class="tab" onclick="setFilter('s1',this)">รอคิว</div>
<div class="tab" onclick="setFilter('s2',this)">กำลังทำ</div>
<div class="tab" onclick="setFilter('s6',this)">เสร็จ</div>
</div>

<div id="list"></div>
</div>

<!-- BILL -->
<div id="billPage" class="page">
<div class="bill" id="billBox">
<h2>🎀 Lana Store 🎀</h2>
<p id="bName"></p>
<p id="bType"></p>
<p id="bQty"></p>
<p id="bTotal"></p>

<hr>

<p>
✿  ✿𓈒𝙷𝚘𝚠 𝚝𝚘𓈒𝚙𝚊𝚢𓈒🍮𓈒🍓𓈒<br>
𓈒ชื่อบัญชีลารีนา พรมป้อง𓈒<br>
𓈒🍀 TRUEWALLET 𓐄 0972962083<br>
SCB 𓐄 9692138645 ⭐<br>
𓈒🍅 PROMPTPAY 𓐄 0841169561<br><br>
โอนวอไม่บวกเพิ่ม<br>
แจ้งสลิปทุกครั้งนะงับ 💖
</p>

<button class="copyBtn" onclick="copyPay()">📋 คัดลอกเลขบัญชี</button>
</div>
</div>

<!-- NAV -->
<div class="nav">
<div class="navItem activeNav" onclick="show('home',this)">🏠<br>หน้าหลัก</div>
<div class="navItem" onclick="show('billPage',this)">🧾<br>บิล</div>
</div>

<button class="fab" onclick="add()">+</button>

<script>
let types=[
{txt:"สติกเกอร์รูปตัวเอง+แชท message",cls:"t1"},
{txt:"ตัดรูปโปร่งใส (ลูกค้า)",cls:"t2"},
{txt:"ตัดรูปโปร่งใส (แม่ค้า)",cls:"t3"},
{txt:"สติกเกอร์ไลน์แบบเซ็ต",cls:"t4"}
];

let statusList=[
{txt:"รอคิว",cls:"s1"},
{txt:"กำลังดำเนินงาน",cls:"s2"},
{txt:"ตัดแต่ง",cls:"s3"},
{txt:"รอผลอนุมัติ",cls:"s4"},
{txt:"แก้ไขงาน",cls:"s5"},
{txt:"ส่งงานเรียบร้อย",cls:"s6"}
];

let qtyList=["8รูป","16รูป","24รูป","32รูป","1-5รูป","10-20รูป","30-40รูป","50รูปขึ้นไป"];

let data=[];

let filter="all";

/* PAGE */
function show(p,el){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
document.querySelectorAll(".navItem").forEach(n=>n.classList.remove("activeNav"));
if(el) el.classList.add("activeNav");
}

/* FILTER */
function setFilter(f,el){
filter=f;
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("activeTab"));
el.classList.add("activeTab");
render();
}

/* ADD */
function add(){
let t=types[Math.floor(Math.random()*types.length)];
let s=statusList[Math.floor(Math.random()*statusList.length)];
let q=qtyList[Math.floor(Math.random()*qtyList.length)];

data.push({
name:"ลูกค้า"+(data.length+1),
type:t,
status:s,
qty:q,
price:Math.floor(Math.random()*500)+100
});

render();
}

/* RENDER */
function render(){
let html="";
let total=0;

data.forEach((r,i)=>{
if(filter!="all" && r.status.cls!=filter) return;

total+=r.price;

html+=`
<div class="card">
<div class="left">
<div class="num n${(i%4)+1}">${i+1}</div>

<div class="avatar">
<img src="https://cdn-icons-png.flaticon.com/512/616/616430.png">
</div>

<div>
<b>${r.name}</b><br>

<div class="type ${r.type.cls}">${r.type.txt}</div><br>

<div class="status ${r.status.cls}">${r.status.txt}</div><br>

<div class="qtyTag">${r.qty}</div>
</div>
</div>

<div class="right">
<div class="price">${r.price} บาท</div>
<button onclick="bill(${i})">🧾</button>
</div>
</div>
`;
});

list.innerHTML=html;
noti.innerText=data.length;
}

/* BILL */
function bill(i){
let r=data[i];
bName.innerText="ลูกค้า: "+r.name;
bType.innerText="งาน: "+r.type.txt;
bQty.innerText="จำนวน: "+r.qty;
bTotal.innerText="รวม: "+r.price+" บาท";
show("billPage");
}

function copyPay(){
navigator.clipboard.writeText("0972962083 / 9692138645 / 0841169561");
alert("คัดลอกแล้ว!");
}

render();
</script>

</body>
</html>
