<script>

/* FIX FORM */

let extra={
five:0,
ten:0,
twenty:0
};

function openForm(){
document.getElementById("formBox").style.display="flex";
}

function closeForm(){
document.getElementById("formBox").style.display="none";
}

window.onclick=function(e){

if(e.target.id==="formBox"){
closeForm();
}

};

function plus(type){

extra[type]++;

updateExtra();

}

function minus(type){

if(extra[type]>0){
extra[type]--;
}

updateExtra();

}

function updateExtra(){

document.getElementById("fiveCount").innerText=extra.five;
document.getElementById("tenCount").innerText=extra.ten;
document.getElementById("twentyCount").innerText=extra.twenty;

document.getElementById("fivePrice").innerText=(extra.five*5)+" ฿";
document.getElementById("tenPrice").innerText=(extra.ten*10)+" ฿";
document.getElementById("twentyPrice").innerText=(extra.twenty*20)+" ฿";

updateTotal();

}

function updateTotal(){

let total=
basePrice+
(extra.five*5)+
(extra.ten*10)+
(extra.twenty*20);

document.getElementById("grandTotal").innerText=total+" ฿";

}

function selectQty(el,qty,price){

document.querySelectorAll(".qtyBtn").forEach(q=>{
q.classList.remove("activeQty");
});

el.classList.add("activeQty");

selectedQty=qty;
basePrice=price;

updateTotal();

}

/* FIX SAVE */

function saveQueue(){

let name=document.getElementById("customerName").value.trim();

if(name===""){
alert("กรอกชื่อลูกค้า");
return;
}

let total=
basePrice+
(extra.five*5)+
(extra.ten*10)+
(extra.twenty*20);

data.push({
name:name,
type:types[typeSelect.value],
status:statusList[statusSelect.value],
qty:selectedQty,
price:total
});

localStorage.setItem("lanaQueue",JSON.stringify(data));

render();

closeForm();

document.getElementById("customerName").value="";

extra={
five:0,
ten:0,
twenty:0
};

updateExtra();

}

/* FIX ปุ่มบิล */

function bill(i){

let r=data[i];

document.getElementById("home").classList.remove("active");
document.getElementById("billPage").classList.add("active");

document.getElementById("bName").innerText=r.name;
document.getElementById("bType").innerText=r.type.txt;
document.getElementById("bStatus").innerText=r.status.txt;
document.getElementById("bQty").innerText=r.qty;
document.getElementById("bBase").innerText=r.price+" บาท";
document.getElementById("bTotal").innerText=r.price+" บาท";

window.scrollTo(0,0);

}

</script>
