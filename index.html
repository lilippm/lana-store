<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Lana Store</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --pink:#ff5f93;
  --pink2:#ff86ad;
  --bg:#fff5f8;
  --card:#ffffff;
  --text:#2b2b2b;
  --sub:#8c8c8c;
}

*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Kanit',sans-serif;
  background:linear-gradient(180deg,#ffeaf2 0%,#fff 60%);
  color:var(--text);
}

/* HEADER */
.header{
  padding:18px 16px 10px;
}
.top{
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.profile{
  display:flex;
  gap:12px;
  align-items:center;
}
.avatar{
  width:52px;height:52px;border-radius:50%;
  background:#ffd9e7;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;
}
.title{font-weight:600;font-size:18px}
.sub{font-size:12px;color:var(--sub)}

.bell{
  position:relative;
  font-size:22px;
}
.badgeBell{
  position:absolute;
  top:-5px;right:-5px;
  background:var(--pink);
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:10px;
}

/* STAT */
.stats{
  display:flex;
  gap:12px;
  padding:12px 16px;
}
.stat{
  flex:1;
  background:var(--card);
  border-radius:20px;
  padding:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}
.stat-title{font-size:12px;color:#999}
.stat-num{
  font-size:22px;
  font-weight:700;
  color:var(--pink);
}

/* SECTION */
.section{
  padding:10px 16px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-weight:600;
}
.refresh{
  background:#f2f2f2;
  padding:6px 12px;
  border-radius:12px;
  font-size:12px;
}

/* CARD LIST */
.card{
  margin:10px 16px;
  background:#fff;
  border-radius:18px;
  padding:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 10px 20px rgba(0,0,0,0.05);
}

.left{
  display:flex;
  gap:12px;
  align-items:center;
}

.icon{
  width:44px;height:44px;
  border-radius:50%;
  background:#ffe0ec;
  display:flex;align-items:center;justify-content:center;
}

.name{font-size:14px;font-weight:600}
.detail{font-size:12px;color:#888}

.right{text-align:right}

.badge{
  font-size:11px;
  padding:5px 10px;
  border-radius:12px;
  display:inline-block;
}

.wait{background:#ffd9e7;color:#ff3f7a;}
.doing{background:#ffe8c2;color:#ff9800;}
.edit{background:#d6ffe5;color:#2ecc71;}
.done{background:#d6ecff;color:#3498db;}

.price{
  margin-top:6px;
  font-weight:600;
  font-size:13px;
}

/* FAB */
.fab{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);
  width:68px;height:68px;
  border-radius:50%;
  border:none;
  background:linear-gradient(45deg,var(--pink),var(--pink2));
  color:#fff;
  font-size:32px;
  box-shadow:0 12px 30px rgba(255,0,100,0.35);
}

/* NAV */
.nav{
  position:fixed;
  bottom:0;
  width:100%;
  background:#fff;
  padding:10px 0 calc(10px + env(safe-area-inset-bottom));
  display:flex;
  justify-content:space-around;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
}
.nav div{
  font-size:12px;
  color:#999;
  text-align:center;
}
.active-nav{color:var(--pink);font-weight:600}

/* mascot */
.mascot{
  position:absolute;
  right:10px;
  top:10px;
  font-size:52px;
}
</style>
</head>

<body>

<div class="header">
  <div class="top">
    <div class="profile">
      <div class="avatar">🐰</div>
      <div>
        <div class="title">สวัสดีค่ะ 💖</div>
        <div class="sub">จัดการคิวงานของคุณวันนี้</div>
      </div>
    </div>
    <div class="bell">🔔<span class="badgeBell">3</span></div>
  </div>
</div>

<div class="stats">
  <div class="stat">
    <div class="stat-title">คิวทั้งหมด</div>
    <div class="stat-num" id="total">0</div>
  </div>
  <div class="stat">
    <div class="stat-title">รายได้รวม</div>
    <div class="stat-num" id="money">0</div>
  </div>
</div>

<div class="section">
  💖 คิวงานทั้งหมด
  <div class="refresh" onclick="render()">รีเฟรช</div>
</div>

<div id="list"></div>

<button class="fab" onclick="add()">+</button>

<div class="nav">
  <div class="active-nav">หน้าหลัก</div>
  <div>รายได้</div>
  <div>บันทึก</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("queue")||"[]");

function render(){
  let html="";
  let total=0;
  let money=0;

  data.forEach((r,i)=>{
    total++;
    money+=r.price;

    html+=`
    <div class="card">
      <div class="left">
        <div class="icon">🐰</div>
        <div>
          <div class="name">${r.name}</div>
          <div class="detail">${r.type} • ${r.qty}</div>
        </div>
      </div>
      <div class="right">
        <div class="badge ${r.status}">${r.statusText}</div>
        <div class="price">${r.price} บาท</div>
      </div>
    </div>`;
  });

  document.getElementById("list").innerHTML=html;
  document.getElementById("total").innerText=total;
  document.getElementById("money").innerText=money;
}

function add(){
  let name=prompt("ชื่อลูกค้า");
  if(!name)return;

  data.push({
    name:name,
    type:"สติกเกอร์",
    qty:"16รูป",
    price:250,
    status:"wait",
    statusText:"รอคิว"
  });

  localStorage.setItem("queue",JSON.stringify(data));
  render();
}

render();
</script>

</body>
</html>
