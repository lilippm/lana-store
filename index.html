<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lana Store</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
background:linear-gradient(180deg,#fff7fb 0%,#fff0f6 100%);
padding-bottom:120px;
color:#333;
overflow-x:hidden;
}

.page{
display:none;
}

.active{
display:block;
}

/* HEADER */

.header{
padding:12px 14px 8px;
display:flex;
justify-content:space-between;
align-items:flex-start;
}

.title{
display:flex;
flex-direction:column;
gap:10px;
width:100%;
}

.topBanner{
width:100%;
max-width:520px;
height:130px;
border-radius:26px;
object-fit:cover;
border:6px solid #ff5f5f;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:4px solid #fff;
background:#fff;
}

.storeRow{
display:flex;
align-items:center;
gap:16px;
margin-left:8px;
}

.bell{
position:relative;
font-size:30px;
background:#fff;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
}

.badge{
position:absolute;
top:-4px;
right:-4px;
background:#ff2f7d;
color:#fff;
width:26px;
height:26px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:12px;
font-weight:700;
border:3px solid #fff;
}

/* SEARCH */

.searchWrap{
padding:0 14px;
}

.search{
background:#fff;
padding:16px;
border-radius:24px;
display:flex;
align-items:center;
gap:10px;
border:2px solid #ffe3ee;
}

.search input{
border:none;
outline:none;
width:100%;
font-size:16px;
background:none;
}

/* TABS */

.tabs{
display:flex;
gap:10px;
overflow:auto;
padding:16px 14px;
}

.tab{
white-space:nowrap;
padding:10px 16px;
border-radius:18px;
background:#fff;
border:2px dashed #ffd0de;
font-size:13px;
font-weight:700;
cursor:pointer;
}

.activeTab{
background:linear-gradient(135deg,#ff5f9a,#ff85b2);
color:#fff;
border:none;
}

/* CARD */

.card{
background:#fff;
margin:0 14px 18px;
padding:18px;
border-radius:36px;
display:flex;
justify-content:space-between;
align-items:flex-start;
border:2px solid #ffe5ef;
}

.left{
display:flex;
gap:16px;
align-items:flex-start;
}

.num{
min-width:50px;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:700;
color:#fff;
margin-top:18px;
}

.n1{background:#ff4f8c;}
.n2{background:#ff9800;}
.n3{background:#5b9dff;}
.n4{background:#8b5cf6;}

.avatar{
width:90px;
height:90px;
border-radius:50%;
overflow:hidden;
background:#fff0f6;
border:5px solid #ffd6e6;
flex-shrink:0;
}

.avatar img{
width:100%;
height:100%;
object-fit:cover;
}

.name{
font-size:28px;
font-weight:700;
margin-bottom:8px;
}

.type{
display:inline-block;
padding:8px 14px;
border-radius:16px;
font-size:14px;
margin-bottom:8px;
font-weight:700;
}

.t1{background:#ffdbe8;color:#ff4f8c;}
.t2{background:#dcecff;color:#4285f4;}
.t3{background:#ffe9c6;color:#ff9800;}
.t4{background:#eadcff;color:#8b5cf6;}

.status{
display:inline-block;
padding:7px 14px;
border-radius:14px;
font-size:13px;
font-weight:700;
margin-right:6px;
margin-top:4px;
}

.s1{background:#ffdbe8;color:#ff4f8c;}
.s2{background:#ffe8bf;color:#ff9800;}
.s3{background:#fff3c6;color:#a17800;}
.s4{background:#dcecff;color:#3498db;}
.s5{background:#eadcff;color:#7d4dff;}
.s6{background:#d9ffe8;color:#11a95c;}

.qty{
display:inline-block;
padding:7px 14px;
border-radius:14px;
background:#f5f5f5;
font-size:13px;
font-weight:700;
margin-top:4px;
}

.price{
font-size:64px;
font-weight:700;
color:#ff4f8c;
text-align:right;
line-height:1;
}

.baht{
font-size:28px;
}

.actionBtns{
display:flex;
gap:10px;
margin-top:16px;
justify-content:flex-end;
}

.billBtn,.delBtn{
border:none;
padding:14px 18px;
border-radius:20px;
font-weight:700;
cursor:pointer;
}

.billBtn{
background:#fff;
border:3px solid #ffb6cb;
color:#ff4f8c;
}

.delBtn{
background:#ffedf3;
}

/* FAB */

.fab{
position:fixed;
bottom:82px;
left:50%;
transform:translateX(-50%);
width:80px;
height:80px;
border:none;
border-radius:50%;
background:linear-gradient(135deg,#ff5f9a,#ff7ab0);
color:#fff;
font-size:45px;
cursor:pointer;
z-index:99;
border:5px solid #fff;
}

/* NAV */

.nav{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:14px 0;
border-top-left-radius:28px;
border-top-right-radius:28px;
}

.navItem{
text-align:center;
font-size:13px;
color:#999;
cursor:pointer;
font-weight:600;
}

.activeNav{
color:#ff4f8c;
font-weight:700;
}

/* FORM */

#formBox{
position:fixed;
inset:0;
background:rgba(0,0,0,.4);
display:none;
align-items:center;
justify-content:center;
padding:15px;
z-index:9999;
}

.formCard{
background:#fff;
width:100%;
max-width:420px;
padding:20px;
border-radius:30px;
max-height:95vh;
overflow-y:auto;
overflow-x:hidden;
border:3px solid #ffe2ec;
position:relative;
z-index:9999;
}

.formTitle{
text-align:center;
font-size:30px;
font-weight:700;
color:#ff4f8c;
margin-bottom:20px;
}

.label{
margin-bottom:8px;
font-size:15px;
font-weight:700;
}

.input{
width:100%;
padding:14px;
border-radius:18px;
border:2px solid #f4f4f4;
margin-bottom:14px;
font-size:15px;
outline:none;
}

.qtyGrid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-bottom:15px;
}

.qtyBtn{
border:2px solid #eee;
border-radius:18px;
padding:14px;
text-align:center;
cursor:pointer;
font-weight:700;
background:#fff;
}

.activeQty{
border-color:#ff4f8c;
background:#fff0f6;
color:#ff4f8c;
}

.totalBox{
text-align:right;
font-size:36px;
font-weight:700;
color:#ff4
