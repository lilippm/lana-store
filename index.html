<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lana Store Ultra Cute</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&family=Patrick+Hand&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
margin:0;
font-family:'Kanit',sans-serif;
background:linear-gradient(180deg,#ffeaf2,#fff5f9);
}

/* PAGE */
.page{display:none}
.active{display:block}

/* HEADER */
.header{
padding:15px;
text-align:center;
font-weight:600;
font-size:20px;
}

/* CARD */
.card{
background:#fff;
margin:10px;
padding:15px;
border-radius:25px;
box-shadow:0 8px 20px rgba(255,105,150,0.15);
position:relative;
}

/* มาสคอต */
.card::after{
content:"👧🏻💖";
position:absolute;
right:10px;
top:10px;
}

/* STATUS */
.wait{background:#ffd9e7}
.doing{background:#ffe8c2}
.done{background:#d6ffe5}

/* BUTTON */
.btn{
padding:8px 10px;
border:none;
border-radius:12px;
background:#ff5f93;
color:#fff;
margin:3px;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px;
}

/* FAB */
.fab{
position:fixed;
bottom:70px;
left:50%;
transform:translateX(-50%);
width:60px;
height:60px;
border-radius:50%;
background:#ff5f93;
color:#fff;
font-size:28px;
border:none;
}

/* 🎨 BILL น่ารัก */
.billCute{
width:320px;
margin:auto;
padding:15px;
background:#fffdf8;
border-radius:25px;
border:3px dashed #ffb6c1;
font-family:'Patrick Hand',cursive;
text-align:center;
position:relative;
}

/* ตกแต่ง */
.billCute::before{
content:"🌸 🌼 💖 🌷";
position:absolute;
top:-15px;
left:10px;
font-size:20px;
}

.billHeader{
font-size:22px;
color:#ff5f93;
margin-bottom:10px;
}

.logo{
font-size:40px;
}

.text{
font-size:18px;
margin:5px;
}

.totalBox{
background:#ffe0ec;
border-radius:15px;
padding:10px;
margin:10px 0;
}

.billFooter{
font-size:14px;
margin-top:10px;
border-top:1px dashed #ffb6c1;
padding-top:10px;
}
</style>
</head>

<body>

<!-- DECOR -->
<div style="text-align:center;font-size:35px;">👧🏻💖🌸✨</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="header">🐰 Lana Store</div>

<div class="card wait">
<h3>💗 รอคิว</h3>
<div id="wait"></div>
</div>

<div class="card doing">
<h3>🧡 กำลังทำ</h3>
<div id="doing"></div>
</div>

<div class="card done">
<h3>💚 เสร็จแล้ว</h3>
<div id="done"></div>
</div>

</div>

<!-- BILL PAGE -->
<div id="billPage" class="page">

<div class="billCute" id="billBox">

<div class="billHeader">🎀 Lana Store 🎀</div>

<div class="logo">👧🏻💗</div>

<p class="text">ลูกค้า: <span id="bName"></span></p>
<p class="text">จำนวน: <span id="bQty"></span></p>
<p class="text">ราคา: <span id="bPrice"></span></p>

<div class="totalBox">
💰 รวมทั้งหมด  
<h2 id="bTotal"></h2>
</div>

<div class="billFooter">
🌸 How to pay 🌸<br><br>

📱 TRUEWALLET: 0972962083 <br>
🏦 SCB: 9692138645 <br>
💸 PROMPTPAY: 0841169561 <br><br>

💖 โอนแล้วแจ้งสลิปได้เลยน้า 💖
</div>

</div>

<button class="btn" onclick="saveImg()">📸 บันทึกรูป</button>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">🏠</div>
<div onclick="line()">💬</div>
</div>

<button class="fab" onclick="add()">+</button>

<script>
let data = JSON.parse(localStorage.getItem("data")||"[]");

function show(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

function add(){
let name=prompt("ชื่อลูกค้า");
let qty=prompt("จำนวน (8/16/24/32)");

let price = qty==8?150:qty==16?250:qty==24?450:600;

data.push({
name:name,
qty:qty+" รูป",
price:price,
status:"wait"
});

save();
}

function save(){
localStorage.setItem("data",JSON.stringify(data));
render();
}

function render(){
let w="",d="",f="";

data.forEach((r,i)=>{

let box=`
<div class="card">
💖 ${r.name}<br>
📦 ${r.qty}<br>
💰 ${r.price} บาท<br>

<button class="btn" onclick="next(${i})">➡️</button>
<button class="btn" onclick="bill(${i})">🧾</button>
<button class="btn" onclick="del(${i})">🗑️</button>
</div>
`;

if(r.status=="wait") w+=box;
else if(r.status=="doing") d+=box;
else f+=box;

});

wait.innerHTML=w;
doing.innerHTML=d;
done.innerHTML=f;
}

function next(i){
let s=data[i].status;
data[i].status = s=="wait"?"doing":s=="doing"?"done":"wait";
save();
}

function del(i){
data.splice(i,1);
save();
}

function bill(i){
let r=data[i];

bName.innerText=r.name;
bQty.innerText=r.qty;
bPrice.innerText=r.price+" บาท";
bTotal.innerText=r.price+" บาท";

show("billPage");
}

function saveImg(){
html2canvas(document.getElementById("billBox")).then(canvas=>{
let link=document.createElement("a");
link.download="bill.png";
link.href=canvas.toDataURL();
link.click();
});
}

function line(){
window.open("https://line.me/R/ti/p/@fvd2237h");
}

render();
</script>

</body>
  </html>
