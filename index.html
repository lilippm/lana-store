<!DOCTYPE html>
<html lang="th">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lana Store PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Kanit',sans-serif;
background:#ffeaf2;
padding-bottom:90px;
}

/* PAGE */
.page{
display:none;
opacity:0;
transform:translateY(20px);
transition:0.3s;
}
.active{
display:block;
opacity:1;
transform:translateY(0);
}

/* HEADER */
.header{
padding:15px;
display:flex;
justify-content:space-between;
font-weight:600;
}

/* SEARCH */
.search{
width:90%;
margin:10px;
padding:10px;
border-radius:15px;
border:none;
}

/* 🟣 TABS */
.tabs{
display:flex;
gap:8px;
margin:10px;
overflow-x:auto;
}

.chip{
padding:6px 14px;
border-radius:20px;
font-size:12px;
background:#fff;
color:#666;
display:flex;
align-items:center;
gap:5px;
box-shadow:0 2px 6px rgba(0,0,0,0.05);
cursor:pointer;
transition:0.2s;
}

/* animation */
.chip:active{
transform:scale(0.9);
}

/* active */
.activeChip{
background:#ff5f93;
color:#fff;
font-weight:600;
}

/* สีแต่ละสถานะ */
.waitChip{background:#ffd9e7}
.doingChip{background:#ffe8c2}
.doneChip{background:#d6ffe5}

/* badge */
.chipCount{
background:#fff;
border-radius:10px;
padding:2px 6px;
font-size:10px;
}

/* CARD */
.card{
background:#fff;
margin:10px;
padding:15px;
border-radius:20px;
}

/* STATUS */
.wait{background:#ffd9e7}
.doing{background:#ffe8c2}
.done{background:#d6ffe5}

/* STEP */
.step{
display:flex;
gap:5px;
margin-top:8px;
}
.stepItem{
flex:1;
height:6px;
border-radius:10px;
background:#eee;
}
.stepActive{
background:#ff5f93;
}

/* BUTTON */
button{
border:none;
padding:6px 10px;
border-radius:10px;
background:#ff5f93;
color:#fff;
margin-top:5px;
}

/* NAV */
.nav{
position:fixed;
bottom:0;
width:100%;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">

<div class="header">
🐰 Lana Store 🔔 <span id="noti">0</span>
</div>

<input class="search" placeholder="ค้นหา..." oninput="search(this.value)">

<!-- TABS -->
<div class="tabs">

<div class="chip activeChip" onclick="filterStatus('all',this)">
ทั้งหมด <span class="chipCount" id="cAll">0</span>
</div>

<div class="chip waitChip" onclick="filterStatus('wait',this)">
รอคิว <span class="chipCount" id="cWait">0</span>
</div>

<div class="chip doingChip" onclick="filterStatus('doing',this)">
กำลังทำ <span class="chipCount" id="cDoing">0</span>
</div>

<div class="chip doneChip" onclick="filterStatus('done',this)">
เสร็จ <span class="chipCount" id="cDone">0</span>
</div>

</div>

<div id="list"></div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="show('home')">🏠</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("data")||"[]");
let currentFilter="all";

/* FILTER */
function filterStatus(status,el){
currentFilter=status;

document.querySelectorAll(".chip").forEach(c=>c.classList.remove("activeChip"));
el.classList.add("activeChip");

render();
}

/* PAGE */
function show(p){
document.querySelectorAll(".page").forEach(e=>e.classList.remove("active"));
setTimeout(()=>document.getElementById(p).classList.add("active"),50);
render();
}

/* RENDER */
function render(listData=data){
let html="";
let w=0,d=0,f=0;

listData.forEach((r,i)=>{
if(r.status=="wait") w++;
if(r.status=="doing") d++;
if(r.status=="done") f++;
});

document.getElementById("cAll").innerText=data.length;
document.getElementById("cWait").innerText=w;
document.getElementById("cDoing").innerText=d;
document.getElementById("cDone").innerText=f;

listData.forEach((r,i)=>{

if(currentFilter!="all" && r.status!=currentFilter) return;

html+=`
<div class="card ${r.status}">
💖 ${r.name}<br>
📦 ${r.qty} รูป<br>
💰 ${r.price} บาท

<div class="step">
<div class="stepItem ${r.status!='wait'?'stepActive':''}"></div>
<div class="stepItem ${r.status=='doing'||r.status=='done'?'stepActive':''}"></div>
<div class="stepItem ${r.status=='done'?'stepActive':''}"></div>
</div>

<button onclick="next(${i})">➡️</button>
<button onclick="del(${i})">🗑️</button>
</div>
`;
});

list.innerHTML=html;
noti.innerText=data.length;
}

/* STATUS */
function next(i){
let s=data[i].status;
data[i].status = s=="wait"?"doing":s=="doing"?"done":"wait";
save();
}

/* DELETE */
function del(i){
data.splice(i,1);
save();
}

/* SAVE */
function save(){
localStorage.setItem("data",JSON.stringify(data));
render();
}

/* SEARCH */
function search(q){
render(data.filter(x=>x.name.includes(q)));
}

/* DEMO DATA */
if(data.length==0){
data=[
{name:"คุณมีนี่",qty:"16",price:250,status:"wait"},
{name:"คุณแพรวา",qty:"24",price:450,status:"doing"},
{name:"คุณเฟิร์น",qty:"32",price:600,status:"done"}
];
save();
}

render();
</script>

</body>
</html>
